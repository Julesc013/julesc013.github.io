name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build:parity

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: site-output
          path: _site
          if-no-files-found: error
